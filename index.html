<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VMS — Requirements</title>
<style>
  :root {
    --bg: #f4f6f4;
    --card: #ffffff;
    --ink: #1e2a20;
    --muted: #5f6f63;
    --line: #dfe6df;
    --accent: #2f7d4f;
    --accent-ink: #ffffff;
    --shadow: 0 1px 3px rgba(30,42,32,.08), 0 6px 20px rgba(30,42,32,.06);
    --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }
  h1 { font-size: 1.4rem; margin: 8px 0 4px; letter-spacing: -.01em; }
  .lead { color: var(--muted); margin: 0 0 20px; }
  a { color: var(--accent); }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 18px; margin: 0 0 16px;
  }
  a.card { display: block; text-decoration: none; color: inherit; }
  a.card:hover { border-color: var(--accent); }
  a.card .arrow { float: right; color: var(--accent); font-weight: 700; }
  label.q { display: block; font-weight: 600; margin: 0 0 6px; }
  .section-tag {
    display: inline-block; font-size: .72rem; text-transform: uppercase; letter-spacing: .06em;
    color: var(--accent); font-weight: 700; margin: 0 0 10px;
  }
  .help { color: var(--muted); font-size: .9rem; margin: 2px 0 10px; }
  input[type=text], input[type=number], textarea, select {
    width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 10px;
    font: inherit; color: inherit; background: #fbfcfb;
  }
  textarea { min-height: 92px; resize: vertical; }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .opt { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border: 1px solid var(--line);
    border-radius: 10px; margin: 6px 0; cursor: pointer; background: #fbfcfb; }
  .opt input { margin-top: 3px; }
  .opt:has(input:checked) { border-color: var(--accent); background: #edf6ef; }
  .btn {
    appearance: none; border: 0; border-radius: 12px; padding: 14px 18px; font: inherit; font-weight: 700;
    background: var(--accent); color: var(--accent-ink); cursor: pointer; width: 100%;
  }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn.secondary { background: #e7ece7; color: var(--ink); }
  .backlink { display: inline-block; margin: 0 0 12px; font-weight: 600; }
  .muted { color: var(--muted); }
  .hidden { display: none !important; }
  .banner { padding: 12px 14px; border-radius: 10px; margin: 0 0 16px; font-weight: 600; }
  .banner.err { background: #fdecec; color: #a12626; }
  .banner.ok { background: #edf6ef; color: #1f6b3d; }
  .note { margin-top: 8px; }
  .footer { text-align: center; color: var(--muted); font-size: .82rem; margin-top: 24px; }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="title">VMS — Requirements</h1>
  <p class="lead" id="lead"></p>
  <div id="banner"></div>
  <div id="who" class="muted" style="margin:0 0 14px"></div>

  <!-- Menu of available forms (shown when no ?form= is given) -->
  <div id="menu" class="hidden"></div>

  <!-- Gate -->
  <div id="gate" class="card hidden">
    <a class="backlink" href="./">← All topics</a>
    <div class="section-tag">Start</div>
    <label class="q" for="name">Your name</label>
    <input type="text" id="name" autocomplete="name" placeholder="Type your name" />
    <label class="q" for="passcode" style="margin-top:14px">Access code</label>
    <input type="text" id="passcode" autocomplete="off" placeholder="Enter the code you were given" />
    <div style="height:14px"></div>
    <button class="btn" id="startBtn">Start answering</button>
  </div>

  <!-- Questions -->
  <form id="form" class="hidden">
    <div id="questions"></div>
    <button class="btn" id="submitBtn" type="submit">Submit answers</button>
    <p class="footer">You can reopen this page and change your answers anytime.</p>
  </form>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
// The Google Apps Script web app URL (ends in /exec). Paste it here.
const ENDPOINT = 'https://script.google.com/macros/s/AKfycbw7NdTpcuzuLd_2B2JBoX7602V-GdolvE0qQY_Wtxv2MkS0BxHvT-eAfMZ-w9Q7pu5DhA/exec';
// ────────────────────────────────────────────────────────────────────────────

const state = { data: null, formId: null, respondent: null, passcode: null, values: {} };
const $ = (s, r=document) => r.querySelector(s);
const el = (t, props={}, kids=[]) => { const n=document.createElement(t); Object.assign(n,props); (Array.isArray(kids)?kids:[kids]).forEach(k=>n.append(k)); return n; };

// Remember the verified name + code on this device so the other forms skip the gate.
const CRED_KEY = 'vmsReqCreds';
function loadCreds() {
  try { const c = JSON.parse(localStorage.getItem(CRED_KEY)); if (c && c.name && c.passcode) return c; } catch (e) {}
  return null;
}
function saveCreds(name, passcode) { try { localStorage.setItem(CRED_KEY, JSON.stringify({ name, passcode })); } catch (e) {} }
function clearCreds() { try { localStorage.removeItem(CRED_KEY); } catch (e) {} location.href = location.pathname + location.search; }

function showIdentity() {
  const w = $('#who'); if (!w) return;
  w.innerHTML = '';
  if (!state.respondent) return;
  w.append(document.createTextNode('Answering as ' + state.respondent + ' · '));
  const a = el('a', { href: '#', textContent: 'change name / code' });
  a.onclick = (e) => { e.preventDefault(); clearCreds(); };
  w.append(a);
}

function banner(msg, kind) {
  const b = $('#banner');
  if (!msg) { b.innerHTML=''; return; }
  b.innerHTML = ''; b.append(el('div',{className:'banner '+kind, textContent:msg}));
}

// Post JSON as text/plain so it stays a "simple" CORS request (no preflight),
// which Apps Script web apps handle and let us read the response of.
async function post(payload) {
  const res = await fetch(ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  return res.json();
}

function param(name) { return new URLSearchParams(location.search).get(name); }

async function boot() {
  state.formId = param('form');
  if (!state.formId) return showMenu();
  try {
    const res = await fetch('questions/' + state.formId + '.json?_=' + Date.now());
    if (!res.ok) throw new Error();
    state.data = await res.json();
  } catch (e) { banner('Could not load this form. Please check the link or refresh.', 'err'); return; }
  const m = state.data.meta || {};
  if (m.title) { $('#title').textContent = m.title; document.title = m.title; }
  if (m.topic) { $('#lead').textContent = m.topic; }

  const creds = loadCreds();
  if (creds) {
    // Already verified on this device — go straight to the questions.
    state.respondent = creds.name;
    state.passcode = creds.passcode;
    showIdentity();
    $('#form').classList.remove('hidden');
    render();
  } else {
    $('#gate').classList.remove('hidden');
  }
}

async function showMenu() {
  let cfg;
  try {
    const res = await fetch('questions/forms.json?_=' + Date.now());
    cfg = await res.json();
  } catch (e) { banner('Could not load the list of forms. Please refresh.', 'err'); return; }
  if (cfg.title) { $('#title').textContent = cfg.title; document.title = cfg.title; }
  if (cfg.intro) { $('#lead').textContent = cfg.intro; }
  const creds = loadCreds();
  if (creds) { state.respondent = creds.name; showIdentity(); }
  const menu = $('#menu'); menu.innerHTML = ''; menu.classList.remove('hidden');
  (cfg.forms || []).forEach(f => {
    const card = el('a', { className:'card', href:'?form=' + encodeURIComponent(f.id) });
    card.append(el('span', { className:'arrow', textContent:'→' }));
    card.append(el('div', { className:'section-tag', textContent:'Topic' }));
    card.append(el('div', { style:'font-weight:600', textContent:f.title }));
    if (f.desc) card.append(el('div', { className:'help', textContent:f.desc }));
    menu.append(card);
  });
}

function visibleFor(q) {
  if (q.status && q.status !== 'active') return false;
  if (q.showIf) {
    const v = state.values[q.showIf.id];
    if ('equals' in q.showIf && v !== q.showIf.equals) return false;
    if ('notEquals' in q.showIf && v === q.showIf.notEquals) return false;
  }
  return true;
}

function fieldFor(q) {
  // Text/number don't drive any showIf, so update the value WITHOUT re-rendering
  // (a full re-render on each keystroke would destroy the field and drop focus).
  if (q.type === 'text') return el('textarea', { id:'f_'+q.id, value: state.values[q.id]||'' , oninput:e=>{ state.values[q.id]=e.target.value; }});
  if (q.type === 'number') return el('input', { type:'number', id:'f_'+q.id, value: state.values[q.id]??'', oninput:e=>{ state.values[q.id]=e.target.value; }});
  if (q.type === 'yes-no') q = {...q, type:'single', options:['Yes','No']};
  if (q.type === 'single' || q.type === 'multi') {
    const box = el('div');
    (q.options||[]).forEach(opt => {
      const input = el('input', { type: q.type==='single'?'radio':'checkbox', name:'g_'+q.id, value:opt });
      const cur = state.values[q.id];
      if (q.type==='single') input.checked = cur===opt;
      else input.checked = Array.isArray(cur) && cur.includes(opt);
      input.onchange = () => {
        if (q.type==='single') set(q.id, opt);
        else {
          const arr = Array.isArray(state.values[q.id]) ? [...state.values[q.id]] : [];
          const i = arr.indexOf(opt);
          if (input.checked && i<0) arr.push(opt); else if (!input.checked && i>=0) arr.splice(i,1);
          set(q.id, arr);
        }
      };
      box.append(el('label',{className:'opt'},[input, el('span',{textContent:opt})]));
    });
    return box;
  }
  return el('div');
}

function set(id, val) { state.values[id] = val; render(); }

function render() {
  const sy = window.scrollY;
  const cont = $('#questions'); cont.innerHTML='';
  let lastSection = null;
  state.data.questions.forEach(q => {
    if (!visibleFor(q)) return;
    const card = el('div',{className:'card'});
    if (q.section !== lastSection) { card.append(el('div',{className:'section-tag', textContent:q.section})); lastSection=q.section; }
    card.append(el('label',{className:'q', htmlFor:'f_'+q.id, textContent:q.text}));
    if (q.help) card.append(el('div',{className:'help', textContent:q.help}));
    card.append(fieldFor(q));
    // optional free-text note for choice questions
    if (q.type==='single'||q.type==='multi'||q.type==='yes-no') {
      card.append(el('input',{type:'text', className:'note', placeholder:'Add a note (optional)', value: state.values[q.id+'__note']||'', oninput:e=>{ state.values[q.id+'__note']=e.target.value; }}));
    }
    cont.append(card);
  });
  window.scrollTo(0, sy);
}

async function start() {
  const name = $('#name').value.trim();
  if (!name) { banner('Please type your name.', 'err'); return; }
  const code = $('#passcode').value.trim();
  if (!code) { banner('Please enter your access code.', 'err'); return; }
  const btn = $('#startBtn'); btn.disabled = true; btn.textContent = 'Checking…';
  try {
    const out = await post({ verifyOnly: true, passcode: code });
    if (out.error) { banner('Wrong access code.', 'err'); return; }
  } catch (e) {
    banner('Could not reach the server — please try again.', 'err'); return;
  } finally {
    btn.disabled = false; btn.textContent = 'Start answering';
  }
  state.respondent = name;
  state.passcode = code;
  saveCreds(name, code);
  banner('');
  showIdentity();
  $('#gate').classList.add('hidden');
  $('#form').classList.remove('hidden');
  render();
}

async function submit(e) {
  e.preventDefault();
  const btn = $('#submitBtn'); btn.disabled = true; btn.textContent = 'Sending…';
  try {
    const out = await post({ passcode: state.passcode, respondent: state.respondent, form: state.formId, answers: state.values });
    if (out.error) throw new Error(out.error);
    banner('Thank you — your answers were saved. You can close this page or change answers and submit again.', 'ok');
    window.scrollTo({top:0, behavior:'smooth'});
  } catch (err) {
    banner('Could not save: ' + err.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Submit answers';
  }
}

$('#startBtn').addEventListener('click', start);
$('#form').addEventListener('submit', submit);
boot();
</script>
</body>
</html>
